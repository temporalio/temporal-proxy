version: 2

project_name: temporal-proxy

builds:
  - id: proxy
    main: ./cmd/proxy
    binary: proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.sha={{.Commit}}
      - -X main.buildTime={{.Date}}

archives:
  - id: default
    ids:
      - proxy
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - images:
      - temporalio/{{ .ProjectName }}

    tags:
      - "v{{.Version }}"
      - "{{ if .IsNightly }}nightly{{ end }}"
      - "{{ if not .IsNightly }}latest{{ end }}"

    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "A proxy for applications, workers, and the Temporal UI"
      "org.opencontainers.image.url": "https://github.com/temporalio/{{ .ProjectName }}"
      "org.opencontainers.image.source": "https://github.com/temporalio/{{ .ProjectName }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "MIT"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^build:"
      - "^chore:"
      - "^\\[docs\\]:"
      - "^\\[test\\]:"
      - "^\\[ci\\]:"
      - "^\\[build\\]:"
      - "^\\[chore\\]:"
  groups:
    - title: Changes
      order: 0
    - title: Dependencies
      regexp: "^Bump "
      order: 1

release:
  github:
    owner: temporalio
    name: temporal-proxy
  draft: false
  prerelease: auto
  name_template: "{{ .Version }} Release"
  header: |
    ## Temporal Proxy {{ .Version }}

    A gRPC proxy that sits between Temporal SDK clients, workers, and the UI on one side and one or more
    upstream Temporal clusters (a local dev cluster, a self-hosted deployment, or Temporal Cloud) on the
    other. It handles namespace translation and TLS termination so applications target a single local
    endpoint while the proxy routes each request to the right upstream.

    ### Installation

    **Go**

    ```bash
    go install github.com/temporalio/{{ .ProjectName }}/cmd/proxy@{{ .Tag }}
    ```

    **Container image**

    ```bash
    docker pull temporalio/{{ .ProjectName }}:v{{ .Version }}
    ```

    **Helm**

    ```bash
    helm install {{ .ProjectName }} {{ .ProjectName }} \
      --repo https://go.temporal.io/helm-charts \
      --version {{ .Version }}
    ```

    Prebuilt binaries for each platform are attached as assets below. See the
    [README](https://github.com/temporalio/{{ .ProjectName }}#installation) for full installation and
    configuration details.

  footer: |
    **Full Changelog**: https://github.com/temporalio/{{ .ProjectName }}/compare/{{ .PreviousTag }}...{{ .Tag }}
