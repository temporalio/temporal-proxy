[settings]
# Required for `mise deps` and the [deps.*] tables below.
experimental = true

[tools]
"github:mattn/goreman" = "latest"
"github:temporalio/cli" = "latest"
buf = "1.69.0"
go = "1.26"
mkcert = "1.4.4"
goreleaser = "2.16.0"

################################################################################
# Dependencies
################################################################################

[deps.go]

[deps.tools]
dir = "dev"
sources = [".mise/config.toml"]
outputs = ["dev/tools.sum"]
description = "Sync dev tools"
run = """
  go get -tool -modfile=tools.mod github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8
  go get -tool -modfile=tools.mod go.uber.org/mock/mockgen@v0.6.0
  go mod tidy -modfile=tools.mod 2>/dev/null || true
"""

################################################################################
# Local Servers & Processes
################################################################################

[tasks.server]
description = "Run the server locally"
interactive = true
depends = ["gen-certs"]
run = "goreman -exit-on-error -set-ports=false -f dev/Procfile start"

# Bare method names are assumed to be on WorkflowService; anything containing a
# slash is treated as a full service/method path (e.g. grpc.health.v1.Health/Check).
[tasks.grpc]
description = "Call the local proxy via buf curl using the dev mTLS certs"
depends = ["gen-certs"]
usage = '''
arg "<method>" help="Method name (e.g. GetSystemInfo) or a full service/method path"
arg "[data]" help="Request body as JSON" default="{}"
'''
run = '''
case "$usage_method" in
  */*) path="$usage_method" ;;
  *)   path="temporal.api.workflowservice.v1.WorkflowService/$usage_method" ;;
esac

buf curl --protocol grpc --http2-prior-knowledge \
  --cacert dev/certs/ca.crt \
  --cert dev/certs/client.crt \
  --key dev/certs/client.key \
  --schema buf.build/temporalio/api \
  -d "$usage_data" \
  "https://localhost:8444/$path"
'''

################################################################################
# Development Tasks
################################################################################

[tasks.lint]
description = "Lint Go files"
run = ["go tool -modfile=dev/tools.mod golangci-lint run"]

[tasks.format]
description = "Format Go files"
run = ["go fix ./...", "go tool -modfile=dev/tools.mod golangci-lint fmt"]

[tasks.test]
description = "Run unit tests"
run = "go test -race -covermode=atomic -coverprofile=coverage.out ./..."

[tasks."test:bench"]
description = "Run bench tests"
usage = '''
flag "-c --count <count>" default="3"
flag "-t --time <time>" default="1s"
flag "-p --packages <packages>" default="./..."
'''
run = "go test -run='^$' -bench=. -benchmem -count=${usage_count?} -benchtime=${usage_time?} ${usage_packages?}"

################################################################################
# Code Gen Tasks
################################################################################

[tasks.gen-certs]
description = "Generate development certs (client and server)"
hide = true
dir = "dev/certs"
env.CAROOT = "."
sources = ["mise.toml"]
outputs = ["server.crt", "client.crt", "extserver.crt", "ca.crt"]
run = [
  "rm -f *.pem *.key *.crt",
  "mkcert -key-file server.key -cert-file server.crt localhost 127.0.0.1 ::1 2>/dev/null",
  "mkcert -client -key-file client.key -cert-file client.crt client 2>/dev/null",
  "mkcert -key-file extserver.key -cert-file extserver.crt extserver localhost 127.0.0.1 ::1 2>/dev/null",
  "mv rootCA.pem ca.crt",
  "rm -f rootCA-key.pem",
]

################################################################################
# Build Tasks
################################################################################

[tasks.build]
description = "Build binaries"
run = "goreleaser release --snapshot --clean --skip=publish"
