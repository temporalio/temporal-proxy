hostPort: :8444
tls:
  ca: dev/certs/ca.crt
  cert: dev/certs/server.crt
  key: dev/certs/server.key

upstreams:
  - name: cluster-1
    hostPort: localhost:7233
    namespaces:
      rules:
        # Always add .remote on the way out, and remove it on the way in.
        suffix: .remote
        overrides:
          # Makes ns2 and ns3 both use ns2.remote on the remote cluster.
          - local: ns3
            remote: ns2.remote

  - name: cluster-2
    hostPort: localhost:7234
    namespaces:
      rules:
        # Always add .remote on the way out, and remove it on the way in.
        suffix: .remote
        overrides:
          # Makes ns2 and ns3 both use ns2.remote on the remote cluster.
          - local: ns3
            remote: ns2.remote

  - name: cluster-3
    hostPort: localhost:7235

routing:
  default: cluster-1

  rules:
    - upstream: cluster-2
      match:
        namespace: test

    - upstream: cluster-3
      match:
        metadata:
          x-cluster: "3"

encryption:
  enabled: true
  cacheSize: 200

  default:
    uri: testing://-ynIaZzFbAjp9VPgu0Ohk9YeQSLS9ta0m9mtnOnGZqo=
    decryptURIs:
      - testing://vRQL-YpK_U44lLNwgAsufmOI-2_lCbQV1LDSdFmcHZ8=
    duration: 1h
    renewBefore: 15m
